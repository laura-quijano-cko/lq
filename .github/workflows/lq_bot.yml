# .github/workflows/lq_bot.yml
# Runs every weekday at 8am London time
# Also runs every Monday to refresh the weekly calendar

name: LQ Weekly Calendar Update

on:
  schedule:
    - cron: "0 7 * * 1"   # Every Monday at 7:00 UTC (8am London)
  workflow_dispatch:        # Also lets you trigger manually from GitHub

jobs:
  update-site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install google-auth google-auth-httplib2 google-api-python-client requests

      - name: Write Google token from secret
        run: echo "${{ secrets.GOOGLE_TOKEN_B64 }}" | base64 -d > token.pickle

      - name: Inject HTML into script
        run: |
          # Replace %%HTML%% placeholder in lq_bot.py with the actual index.html content
          python3 - <<'EOF'
          with open('index.html', 'r') as f:
              html = f.read()
          with open('lq_bot.py', 'r') as f:
              script = f.read()
          # Escape for safe embedding
          html_escaped = html.replace('\\', '\\\\').replace('"""', '\\"\\"\\"')
          script = script.replace('%%HTML%%', html_escaped)
          with open('lq_bot_injected.py', 'w') as f:
              f.write(script)
          print("✅ HTML injected into script")
          EOF

      - name: Run LQ Updater
        env:
          GOOGLE_TOKEN_B64: ${{ secrets.GOOGLE_TOKEN_B64 }}
          PAT_TOKEN:        ${{ secrets.PAT_TOKEN }}
        run: python lq_bot_injected.py
